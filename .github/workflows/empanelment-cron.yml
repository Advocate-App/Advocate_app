name: Empanelment Automation

on:
  # Disabled GitHub Actions schedule — using cron-job.org instead (more reliable)
  # To re-enable, uncomment the schedule block below
  # schedule:
  #   - cron: '30 0 * * *'
  #   - cron: '30 4 * * 1-5'
  #   - cron: '30 5 * * 1'
  #   - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run manually'
        required: true
        type: choice
        options:
          - auto-draft
          - auto-send
          - auto-followup
          - check-replies
          - health

env:
  APP_URL: https://advocate-diary-hub-orpin.vercel.app

jobs:
  auto-draft:
    if: github.event.inputs.action == 'auto-draft'
    runs-on: ubuntu-latest
    steps:
      - name: Generate drafts for new applications
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.APP_URL }}/api/cron/auto-draft")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then exit 1; fi

  auto-send:
    if: github.event.inputs.action == 'auto-send'
    runs-on: ubuntu-latest
    steps:
      - name: Send max 5 ready applications
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.APP_URL }}/api/cron/auto-send")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then exit 1; fi

  auto-followup:
    if: github.event.inputs.action == 'auto-followup'
    runs-on: ubuntu-latest
    steps:
      - name: Send follow-ups
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.APP_URL }}/api/cron/auto-followup")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then exit 1; fi

  check-replies:
    if: github.event.inputs.action == 'check-replies'
    runs-on: ubuntu-latest
    steps:
      - name: Check Gmail for replies
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.APP_URL }}/api/cron/check-replies")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then exit 1; fi

  health:
    if: github.event.inputs.action == 'health'
    runs-on: ubuntu-latest
    steps:
      - name: Check all env vars are configured
        run: |
          response=$(curl -s "${{ env.APP_URL }}/api/cron/health")
          echo "Health check: $response"
